<div class="col-md-3 col-lg-2 d-md-block sidebar collapse show" id="sidebarMenu">
  <div class="position-sticky pt-3">
    <ul class="nav flex-column">
      
      <!-- Dashboard -->
      <li class="nav-item">
        <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}" 
           href="{% url 'dashboard' %}">
          <i class="bi bi-speedometer2"></i>
          Dashboard
        </a>
      </li>
      
      <!-- Células -->
      <li class="nav-item">
        <a class="nav-link {% if 'cell' in request.resolver_match.url_name %}active{% endif %}" 
           href="{% url 'cell_list' %}">
          <i class="bi bi-house-door"></i>
          Células
        </a>
      </li>
      
      <!-- Membros -->
      <li class="nav-item">
        <a class="nav-link {% if 'member' in request.resolver_match.url_name %}active{% endif %}" 
           href="{% url 'member_list' %}">
          <i class="bi bi-people"></i>
          Membros
        </a>
      </li>
      
      <!-- Visitantes -->
      <li class="nav-item">
        <a class="nav-link {% if 'visitor' in request.resolver_match.url_name %}active{% endif %}" 
           href="{% url 'visitor_list' %}">
          <i class="bi bi-person-plus"></i>
          Visitantes
        </a>
      </li>
      
      <!-- Reuniões -->
      <li class="nav-item">
        <a class="nav-link {% if 'meeting' in request.resolver_match.url_name %}active{% endif %}" 
           href="{% url 'meeting_list' %}">
          <i class="bi bi-calendar-check"></i>
          Reuniões
        </a>
      </li>
      
      <!-- Presenças -->
      <li class="nav-item">
        <a class="nav-link {% if 'attendance' in request.resolver_match.url_name %}active{% endif %}" 
           href="{% url 'attendance_list' %}">
          <i class="bi bi-clipboard-check"></i>
          Presenças
        </a>
      </li>
      
      <!-- Calendário -->
      <li class="nav-item">
        <a class="nav-link {% if 'calendar' in request.resolver_match.url_name %}active{% endif %}" 
           href="{% url 'calendar_list' %}">
          <i class="bi bi-calendar3"></i>
          Calendário
        </a>
      </li>
      
      <!-- Lideranças (apenas para supervisores/pastores) -->
      {% if user.is_staff or user.leadership_positions.exists %}
      <li class="nav-item">
        <a class="nav-link {% if 'leadership' in request.resolver_match.url_name %}active{% endif %}" 
           href="{% url 'leadership_list' %}">
          <i class="bi bi-star"></i>
          Lideranças
        </a>
      </li>
      {% endif %}
      
      <!-- Ministérios -->
      <li class="nav-item">
        <a class="nav-link {% if 'ministry' in request.resolver_match.url_name %}active{% endif %}" 
           href="{% url 'ministry_list' %}">
          <i class="bi bi-building"></i>
          Ministérios
        </a>
      </li>
      
      <hr class="my-3">
      
      <!-- Relatórios -->
      <li class="nav-item">
        <a class="nav-link {% if 'report' in request.resolver_match.url_name %}active{% endif %}" 
           href="{% url 'reports' %}">
          <i class="bi bi-graph-up"></i>
          Relatórios
        </a>
      </li>
      
      <!-- Áreas (admin) -->
      {% if user.is_staff %}
      <li class="nav-item">
        <a class="nav-link {% if 'area' in request.resolver_match.url_name %}active{% endif %}" 
           href="{% url 'area_list' %}">
          <i class="bi bi-diagram-3"></i>
          Áreas
        </a>
      </li>
      
      <!-- Admin Django -->
      <li class="nav-item">
        <a class="nav-link" href="{% url 'admin:index' %}" target="_blank">
          <i class="bi bi-gear"></i>
          Administração
        </a>
      </li>
      {% endif %}
    </ul>
  </div>
</div>
